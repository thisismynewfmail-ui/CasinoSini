<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Neon Casino · Restricted</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/casino.css') }}">
</head>
<body>

<div class="casino-bg" aria-hidden="true"></div>

<div class="forbidden-frame">
    <div class="window forbidden-window">
        <div class="window-title">
            <span class="ico"></span>
            <span class="label">Restricted area</span>
            <div class="controls">
                <a href="/lobby" class="ctrl close" title="Back to lobby" style="text-decoration:none;">&times;</a>
            </div>
        </div>
        <div class="window-body">
            <h1>Off-limits</h1>
            <p>The admin console is for house staff only — your account doesn't have the keys.</p>
            <p style="margin-top: 22px;">
                <a class="btn primary" href="/lobby" style="text-decoration:none;">&#8592; Back to the lobby</a>
            </p>
        </div>
    </div>
</div>

</body>
</html>
