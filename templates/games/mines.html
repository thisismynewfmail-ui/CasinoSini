<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Gem Mines - Neon Casino</title>
<script src="{{ url_for('static', filename='js/engine.js') }}"></script>
<style>
.mines-bg {
  position: fixed; inset: 0; z-index: -1;
  background:
    radial-gradient(ellipse 80% 55% at 50% 0%, rgba(34,211,238,0.18), transparent 60%),
    radial-gradient(ellipse 60% 50% at 15% 95%, rgba(34,211,238,0.10), transparent 60%),
    var(--bg-primary);
}
.game-title { color: #22d3ee; }
.game-subtitle { color: rgba(6,182,212,0.6); }
.mines-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  width: 100%;
  max-width: 360px;
  margin-bottom: 12px;
}
.mines-grid .tile {
  aspect-ratio: 1;
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  border: 1.5px solid rgba(255,255,255,0.06);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  transition: all 0.2s ease;
  min-height: 52px;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.mines-grid .tile:hover:not(.revealed):not(.disabled) {
  border-color: rgba(6,182,212,0.3);
  background: var(--bg-card-hover);
}
.mines-grid .tile.revealed.gem {
  background: rgba(6,182,212,0.15);
  border-color: rgba(6,182,212,0.3);
  cursor: default;
  animation: gemReveal 0.4s ease;
}
.mines-grid .tile.disabled { cursor: default; opacity: 0.6; }
.mines-grid .tile.revealed.bomb {
  background: rgba(239,68,68,0.15);
  border-color: rgba(239,68,68,0.3);
  cursor: default;
  animation: bombReveal 0.4s ease;
}
@keyframes gemReveal {
  0% { transform: scale(0.8); opacity: 0; box-shadow: 0 0 0 rgba(6,182,212,0); }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); opacity: 1; box-shadow: 0 0 20px rgba(6,182,212,0.2); }
}
@keyframes bombReveal {
  0% { transform: scale(0.8); }
  30% { transform: scale(1.3); }
  100% { transform: scale(1); }
}
.mines-info {
  width: 100%;
  max-width: 360px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  font-size: 14px;
}
.mines-info .mult-label { color: var(--text-secondary); }
.mines-info .mult-value {
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 700;
  color: var(--accent-gold);
}
.mines-info .gems-label { color: var(--text-secondary); }
.mines-info .gems-value {
  font-family: var(--font-mono);
  font-weight: 600;
  color: var(--accent-cyan);
}
.mines-controls {
  width: 100%;
  max-width: 360px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.mine-count-select {
  display: flex;
  gap: 6px;
  justify-content: center;
}
.mine-count-select button {
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 600;
  border-radius: var(--radius-pill);
  border: 1.5px solid rgba(255,255,255,0.08);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s ease;
  min-height: 38px;
}
.mine-count-select button.active {
  border-color: var(--accent-cyan);
  color: var(--text-primary);
  background: rgba(6,182,212,0.12);
}
.result-line {
  font-size: 14px;
  text-align: center;
  min-height: 24px;
  color: var(--text-secondary);
  margin-top: 4px;
}
</style>
</head>
<body>
<div class="mines-bg"></div>
<a href="/lobby" class="back-btn">&#8592;</a>
<div class="top-bar">
  <div class="balance-wrap">
    <span class="balance-label">Bankroll</span>
    <span class="balance-value" data-value="{{ tokens }}">${{ tokens }}</span>
  </div>
  <div class="stats-wrap">
    <span class="stat">&nbsp;<span class="stat-streak">{{ stats.streak }}</span></span>
    <span class="stat">W<span class="stat-wins">{{ stats.wins }}</span></span>
    <span class="stat">L<span class="stat-losses">{{ stats.losses }}</span></span>
  </div>
</div>

<div class="page active">
  <div class="game-title">&#9878;&#65039; Gem Mines</div>
  <div class="game-subtitle">Reveal gems. Dodge bombs. Cash out anytime.</div>

  <div class="mines-grid" id="minesGrid"></div>

  <div class="mines-info">
    <div><span class="mult-label">Multiplier</span> <span class="mult-value" id="multValue">1.00x</span></div>
    <div><span class="gems-label">Gems</span> <span class="gems-value"><span id="gemCount">0</span>/22</span></div>
  </div>

  <div class="mines-controls">
    <div class="bet-area">
      <div class="bet-row">
        <div class="bet-input">
          <span style="color:var(--text-secondary)">$</span>
          <input type="number" id="betInput" value="10" min="5" step="5">
        </div>
        <button class="bet-quick" data-amount="10">10</button>
        <button class="bet-quick" data-amount="25">25</button>
        <button class="bet-quick" data-amount="50">50</button>
        <button class="bet-quick" data-amount="100">100</button>
      </div>
    </div>
    <div class="mine-count-select">
      <span style="color:var(--text-secondary);font-size:13px;display:flex;align-items:center">Bombs:</span>
      <button data-mines="1">1</button>
      <button data-mines="3" class="active">3</button>
      <button data-mines="5">5</button>
      <button data-mines="8">8</button>
    </div>
    <button class="btn btn-cyan btn-lg" id="betBtn" style="background:linear-gradient(135deg,#06b6d4,#0891b2);color:#fff;box-shadow:0 4px 14px rgba(6,182,212,0.35)">&#9878;&#65039; Start Mining</button>
    <button class="btn btn-green btn-lg" id="cashoutBtn" style="display:none">&#128176; Cash Out ($<span id="cashoutAmount">0</span>)</button>
  </div>
  <div class="result-line" id="resultLine"></div>
</div>

<div id="game-over-overlay">
  <h2>BANKRUPT</h2>
  <p>Your chips have run out. Start a new session?</p>
  <button class="btn btn-gold btn-lg" onclick="(function(){CasinoEngine.API.resetTokens().then(function(r){if(r.ok){CasinoEngine.GameState.setFromData(r);document.getElementById('game-over-overlay').classList.remove('active')}})})()">Play Again</button>
</div>

<script>
window.__APP__ = {
  user: {{ user | tojson }},
  tokens: {{ tokens }},
  stats: {{ stats | tojson }},
  game: "mines",
  min_bet: {{ min_bet }}
};
(function() {
  'use strict';
  const GS = CasinoEngine.GameState;
  const API = CasinoEngine.API;
  const sound = CasinoEngine.sound;
  GS.currentGame = 'mines';

  const GRID_SIZE = 5;
  const TOTAL_TILES = 25;
  const gridEl = document.getElementById('minesGrid');
  const betInput = document.getElementById('betInput');
  const betBtn = document.getElementById('betBtn');
  const cashoutBtn = document.getElementById('cashoutBtn');
  const multValue = document.getElementById('multValue');
  const gemCount = document.getElementById('gemCount');
  const cashoutAmount = document.getElementById('cashoutAmount');
  const resultLine = document.getElementById('resultLine');

  let bombs = 3;
  let board = [];
  let revealed = [];
  let gameActive = false;
  let gemsRevealed = 0;
  let betAmount = 0;
  let currentBetId = null;

  document.querySelectorAll('.bet-quick').forEach(function(btn) {
    btn.addEventListener('click', function() {
      betInput.value = parseInt(this.dataset.amount);
      document.querySelectorAll('.bet-quick').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      sound.click();
    });
  });

  document.querySelectorAll('.mine-count-select button').forEach(function(btn) {
    btn.addEventListener('click', function() {
      bombs = parseInt(this.dataset.mines);
      document.querySelectorAll('.mine-count-select button').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      sound.click();
      if (!gameActive) resetBoard();
      else { resetBoard(); }
    });
  });

  function calcMultiplier(revealedCount, totalBombs) {
    let prob = 1;
    for (let i = 0; i < revealedCount; i++) {
      prob *= (TOTAL_TILES - totalBombs - i) / (TOTAL_TILES - i);
    }
    const fair = 1 / prob;
    return Math.floor(fair * 0.95 * 100) / 100;
  }

  function initBoard() {
    board = Array(TOTAL_TILES).fill('safe');
    const positions = [];
    for (let i = 0; i < TOTAL_TILES; i++) positions.push(i);
    for (let i = positions.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [positions[i], positions[j]] = [positions[j], positions[i]];
    }
    for (let i = 0; i < bombs; i++) board[positions[i]] = 'bomb';
    revealed = Array(TOTAL_TILES).fill(false);
    gemsRevealed = 0;
    gameActive = true;
    betBtn.style.display = 'none';
    cashoutBtn.style.display = 'none';
    updateDisplay();
    renderGrid();
  }

  function resetBoard() {
    gameActive = false;
    board = [];
    revealed = [];
    gemsRevealed = 0;
    betBtn.style.display = 'flex';
    cashoutBtn.style.display = 'none';
    multValue.textContent = '1.00x';
    gemCount.textContent = '0';
    cashoutAmount.textContent = '0';
    resultLine.textContent = '';
    renderGrid();
  }

  function renderGrid() {
    gridEl.innerHTML = '';
    for (let i = 0; i < TOTAL_TILES; i++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.dataset.index = i;
      if (revealed[i]) {
        tile.classList.add('revealed');
        if (board[i] === 'bomb') {
          tile.classList.add('bomb');
          tile.textContent = '\u{1F4A3}';
        } else {
          tile.classList.add('gem');
          const gemTypes = ['\u25C6','\u25C7','\u2685','\u2686','\u25CE','\u25CF'];
          tile.textContent = gemTypes[i % gemTypes.length];
        }
      }
      if (!gameActive) tile.classList.add('disabled');
      tile.addEventListener('click', function() { handleTileClick(parseInt(this.dataset.index)); });
      gridEl.appendChild(tile);
    }
  }

  async function handleTileClick(index) {
    if (!gameActive || revealed[index]) return;
    if (board[index] === 'bomb') {
      revealed[index] = true;
      revealAll();
      sound.explosion();
      const lossResult = await API.recordLoss(currentBetId);
      if (lossResult.ok) {
        GS.balance = lossResult.tokens;
        GS.setStats(lossResult.stats);
      }
      GS.checkGameOver();
      resultLine.textContent = 'BOOM! Hit a mine.';
      gameActive = false;
      const pt = new CasinoEngine.ParticleSystem();
      pt.burst(40, ['#ef4444','#dc2626','#f87171']);
      gridEl.classList.add('shake');
      setTimeout(function() { gridEl.classList.remove('shake'); }, 500);
      setTimeout(resetBoard, 1500);
      renderGrid();
      return;
    }
    revealed[index] = true;
    gemsRevealed++;
    if (gemsRevealed >= 1 && cashoutBtn.style.display === 'none') {
      cashoutBtn.style.display = 'flex';
    }
    sound.reveal();
    updateDisplay();
    renderGrid();
    if (gemsRevealed === TOTAL_TILES - bombs) {
      cashOut();
    }
  }

  function revealAll() {
    for (let i = 0; i < TOTAL_TILES; i++) {
      if (board[i] === 'bomb') revealed[i] = true;
    }
    renderGrid();
  }

  function updateDisplay() {
    const mult = calcMultiplier(gemsRevealed, bombs);
    multValue.textContent = mult.toFixed(2) + 'x';
    gemCount.textContent = gemsRevealed;
    if (gameActive) {
      const winVal = Math.floor(betAmount * mult);
      cashoutAmount.textContent = winVal;
    }
  }

  async function cashOut() {
    if (!gameActive) return;
    const mult = calcMultiplier(gemsRevealed, bombs);
    const winAmount = Math.floor(betAmount * mult);
    const result = await API.recordWin(currentBetId, winAmount);
    if (result.ok) {
      GS.balance = result.tokens;
      GS.setStats(result.stats);
    }
    GS.checkGameOver();
    sound.cashOut();
    resultLine.textContent = 'Cashed out ' + gemsRevealed + ' gems at ' + mult.toFixed(2) + 'x for $' + winAmount + '!';
    gameActive = false;
    const pt = new CasinoEngine.ParticleSystem();
    pt.burst(40, ['#06b6d4','#22d3ee','#ffd700','#22c55e']);
    setTimeout(resetBoard, 2000);
  }

  async function startGame() {
    const amt = parseInt(betInput.value) || CasinoEngine.MIN_BET;
    if (amt > GS.balance) {
      resultLine.textContent = 'Not enough chips!';
      GS.checkGameOver();
      return;
    }
    const result = await API.placeBet('mines', amt);
    if (!result.ok) {
      resultLine.textContent = result.error || 'Bet failed';
      return;
    }
    GS.balance = result.tokens;
    currentBetId = result.bet_id;
    betAmount = amt;
    initBoard();
    sound.click();
    GS.updateUI();
  }

  betBtn.addEventListener('click', function() {
    if (GS.balance < CasinoEngine.MIN_BET) {
      resultLine.textContent = 'Not enough chips!';
      GS.checkGameOver();
      return;
    }
    startGame();
  });

  cashoutBtn.addEventListener('click', function() {
    if (gameActive && gemsRevealed > 0) cashOut();
  });

  resetBoard();
  GS.setFromData(window.__APP__);
})();
</script>
</body>
</html>
